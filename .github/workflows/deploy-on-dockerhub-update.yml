name: Deploy on Docker Hub image update

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch:

jobs:
  check-and-deploy:
    name: Check Docker image digest and deploy if updated
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-group
      cancel-in-progress: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image variables
        id: vars
        run: |
          echo "IMAGE=librebooking/librebooking" >> $GITHUB_OUTPUT
          echo "TAG=develop" >> $GITHUB_OUTPUT

      - name: Get current Docker Hub image ID
        id: dockerhub
        run: |
          IMAGE_ID=$(docker buildx imagetools inspect docker.io/${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.TAG }} --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Current Docker Hub image ID: $IMAGE_ID"

      - name: Find previous successful build run
        id: find-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: deploy-on-dockerhub-update.yml
        run: |
          RUN_ID=$(gh api \
            "/repos/$REPO/actions/workflows/$WORKFLOW_FILE/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download digest artifact
        uses: actions/download-artifact@v6
        with:
          name: image-digest
          run-id: ${{ steps.find-run.outputs.RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifact
        continue-on-error: true

      - name: Compare digests
        id: compare
        run: |
          if [ -f digest.txt ]; then
            PREVIOUS_DIGEST=$(cat digest.txt)
            echo "Previous digest: $PREVIOUS_DIGEST"
            echo "Current digest: ${{ steps.dockerhub.outputs.digest }}"
            
            if [ "$PREVIOUS_DIGEST" != "${{ steps.dockerhub.outputs.digest }}" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "✅ Image has been updated!"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "⏭️ No changes detected"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🆕 First run, will deploy"
          fi

      - name: Setup Fly.io CLI
        if: steps.compare.outputs.changed == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: steps.compare.outputs.changed == 'true'
        run: flyctl deploy --remote-only --no-cache --recreate-builder
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Save current digest
        if: steps.compare.outputs.changed == 'true'
        run: echo "${{ steps.dockerhub.outputs.digest }}" > digest.txt

      - name: Upload digest artifact
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: docker-digest
          path: digest.txt
          retention-days: 90